{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Pest Classifier</title>
    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Custom Glassmorphism Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<style>
    body {
        background-image: url('{% block bg_image %}{% static "img/agri_tech_bg.png" %}{% endblock %}');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
    }
</style>
<body>
    
    <div class="sidebar">
        <h2>
            <i class="bi bi-shield-lock-fill mb-2" style="font-size: 2rem;"></i><br>
            Admin Panel
        </h2>
        <div class="nav flex-column mt-4">
            <a class="nav-link" href="{% url 'adminhome' %}">
                <i class="bi bi-speedometer2 me-2"></i> Dashboard
            </a>
            <a class="nav-link" href="{% url 'RegisterUsersView' %}">
                <i class="bi bi-people-fill me-2"></i> User Records
            </a>
            <a class="nav-link text-danger mt-5" href="{% url 'Logout' %}">
                <i class="bi bi-box-arrow-right me-2"></i> Logout
            </a>
        </div>
    </div>
    
    <div class="content">
        {% block contents %}
        {% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
